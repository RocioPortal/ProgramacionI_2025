<nav class="navbar bg-brand">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold text-white" routerLink="/empleado/menu">← Volver</a>
    <span class="navbar-text text-white fw-bold" text-align="center">Pedidos</span>
    <span></span>
  </div>
</nav>

<div class="container pt-4">
  <div class="text-center mb-3 d-flex gap-2 justify-content-center">
    <button 
      type="button" 
      class="btn btn-pedidos-pill"
      [class.active]="estadoFiltro === 'Pendiente'" 
      (click)="filtrarPendientes()">
      {{ estadoFiltro === 'Pendiente' ? 'MOSTRAR TODOS' : 'PEDIDOS PENDIENTES' }}
    </button>
    <a routerLink="/empleado/pedido-nuevo" class="btn btn-pedidos-pill">
      <i class="bi bi-plus-lg me-1"></i>NUEVO PEDIDO
    </a>
  </div>

  <hr class="mt-4">

  <h5 class="mt-3 mb-3" style="color:#2f2a26;">Id Pedidos</h5>

  <div *ngIf="pedidos.length > 0; else noPedidos">
    <div *ngFor="let pedido of pedidos" class="pedido-item">
      <div class="pedido-id"># {{ pedido.id_pedido }}</div>
      
      <div class="pedido-estado" [ngClass]="'estado-' + pedido.estado.toLowerCase()">
        {{ pedido.estado | titlecase }}
      </div>

      <div class="d-flex gap-2">
        <button class="action-btn action-delete" title="Eliminar" (click)="eliminarPedido(pedido.id_pedido)">
          <i class="bi bi-trash"></i>
        </button>
        <a class="action-btn action-edit" [routerLink]="['/empleado/pedido-info', pedido.id_pedido]" title="Editar">
          <i class="bi bi-pencil-square"></i>
        </a>
      </div>
    </div>
  </div>

  <ng-template #noPedidos>
    <div class="alert alert-info text-center">
      No hay pedidos para mostrar.
    </div>
  </ng-template>

  <nav *ngIf="totalPages > 1" class="d-flex justify-content-center mt-4">
    <ul class="pagination pagination-sm">
      <li class="page-item" [class.disabled]="currentPage === 1">
        <a class="page-link" href="javascript:void(0)" (click)="goToPage(currentPage - 1)">&laquo;</a>
      </li>
      <li *ngFor="let pageNum of getPageNumbers()" class="page-item" [class.active]="currentPage === pageNum">
        <a class="page-link" href="javascript:void(0)" (click)="goToPage(pageNum)">{{ pageNum }}</a>
      </li>
      <li class="page-item" [class.disabled]="currentPage === totalPages">
        <a class="page-link" href="javascript:void(0)" (click)="goToPage(currentPage + 1)">&raquo;</a>
      </li>
    </ul>
  </nav>

</div>
