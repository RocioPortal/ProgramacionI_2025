<div class="screen">
    <nav class="navbar bg-brand">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold text-white" routerLink="/empleado/menu">← Volver</a>
        <span class="navbar-text text-white fw-bold">Clientes</span>
        <span></span>
      </div>
    </nav>
  
    <div class="container pt-3 pb-4">
      
      <div class="search-wrap d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-search ms-1"></i>
        <input type="text" class="form-control border-0 bg-transparent" 
               placeholder="Buscar clientes por nombre..."
               [(ngModel)]="terminoBusqueda" 
               (input)="loadClientes()">
        <button class="btn btn-light rounded-3"><i class="bi bi-sliders"></i></button>
      </div>
  
      <div *ngIf="users.length > 0; else noClientes">
        <div *ngFor="let user of users" class="client-item">
          <div>
            <div class="client-name">{{ user.nombre | uppercase }}</div>
            <div class="client-status" [ngClass]="user.estado === 'activo' ? 'status-active' : 'status-suspended'">
              {{ user.estado | uppercase }}
            </div>
          </div>

          <div>
            <button *ngIf="user.estado === 'activo'" (click)="toggleEstado(user)" class="action-btn btn-suspend" title="Suspender Cliente">
              <i class="bi bi-person-x"></i>
            </button>
            
            <button *ngIf="user.estado !== 'activo'" (click)="toggleEstado(user)" class="action-btn btn-activate" title="Reactivar Cliente">
              <i class="bi bi-person-check"></i>
            </button>
          </div>
          
        </div>
      </div>

      <ng-template #noClientes>
        <div class="alert alert-info text-center mt-3">
          No se encontraron clientes.
        </div>
      </ng-template>
  
      <nav *ngIf="totalPages > 1" class="d-flex justify-content-center mt-4">
        <ul class="pagination pagination-sm">
          <li class="page-item" [class.disabled]="currentPage === 1">
            <a class="page-link" href="javascript:void(0)" (click)="goToPage(currentPage - 1)">&laquo;</a>
          </li>
          <li *ngFor="let pageNum of getPageNumbers()" class="page-item" [class.active]="currentPage === pageNum">
            <a class="page-link" href="javascript:void(0)" (click)="goToPage(pageNum)">{{ pageNum }}</a>
          </li>
          <li class="page-item" [class.disabled]="currentPage === totalPages">
            <a class="page-link" href="javascript:void(0)" (click)="goToPage(currentPage + 1)">&raquo;</a>
          </li>
        </ul>
      </nav>

    </div>
</div>
