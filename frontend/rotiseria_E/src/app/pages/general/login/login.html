<div class="d-flex justify-content-center align-items-center vh-100" style="background-color: var(--color-fondo);">
  <div class="card shadow p-4" style="border-radius: 20px; max-width: 380px; width: 100%;">
    <ul class="nav nav-tabs mb-3">
      <li class="nav-item">
        <span class="nav-link active">Iniciar sesión</span>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/registro">Registrarse</a>
      </li>
    </ul>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input
          type="email"
          class="form-control"
          placeholder="Tu email"
          required
          formControlName="email"> <div *ngIf="email?.invalid && (email?.dirty || email?.touched)" class="text-danger small mt-1">
          <div *ngIf="email?.errors?.['required']">El email es requerido.</div>
          <div *ngIf="email?.errors?.['email']">El formato del email no es válido.</div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input
          type="password"
          class="form-control"
          placeholder="Tu contraseña"
          required
          formControlName="password"> <div *ngIf="password?.invalid && (password?.dirty || password?.touched)" class="text-danger small mt-1">
          <div *ngIf="password?.errors?.['required']">La contraseña es requerida.</div>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="recordarme">
          <label class="form-check-label" for="recordarme">Recordarme</label>
        </div>
        <a href="#" class="small text-decoration-none" style="color: var(--color-principal);">
          ¿Olvidaste tu contraseña?
        </a>
      </div>

      <button type="submit" class="btn btn-custom w-100" [disabled]="loginForm.invalid">Acceso</button>

      <div *ngIf="errorMsg" class="text-danger text-center mt-3" style="font-weight:600;">
        {{ errorMsg }}
      </div>
    </form>
  </div>
</div>
