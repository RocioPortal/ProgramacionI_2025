<div class="d-flex justify-content-center align-items-center vh-100" style="background-color: var(--color-fondo);">
  <div class="card shadow p-4" style="border-radius: 20px; max-width: 380px; width: 100%;">
    <!-- Tabs -->
    <ul class="nav nav-tabs mb-3">
      <li class="nav-item">
        <span class="nav-link active">Iniciar sesión</span>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/registro">Registrarse</a>
      </li>
    </ul>

    <!-- Formulario -->
    <form (ngSubmit)="onSubmit()" novalidate>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input
          type="text"
          class="form-control"
          placeholder="admin | empleado | cliente"
          required
          name="email"
          [(ngModel)]="email">
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input
          type="password"
          class="form-control"
          placeholder="admin | empleado | cliente"
          required
          minlength="4"
          name="password"
          [(ngModel)]="password">
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="recordarme">
          <label class="form-check-label" for="recordarme">Recordarme</label>
        </div>
        <a href="#" class="small text-decoration-none" style="color: var(--color-principal);">
          ¿Olvidaste tu contraseña?
        </a>
      </div>

      <button type="submit" class="btn btn-custom w-100">Acceso</button>

      <!-- Mensaje de error -->
      <div *ngIf="errorMsg" class="text-danger text-center mt-3" style="font-weight:600;">
        {{ errorMsg }}
      </div>
    </form>
  </div>
</div>
