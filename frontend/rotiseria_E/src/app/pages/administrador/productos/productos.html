<div class="container-main">

  <section id="productos-lista" *ngIf="mostrarLista">
    <div class="header">
      <app-boton-volver text="← volver" routerLink="/administrador/menu"></app-boton-volver>
      <h2 class="text-center">PRODUCTOS</h2>
    </div>

    <app-product-list 
      [products]="products" 
      listStyle="card" 
      userRole="admin"
      (productSelect)="verDetalle($event)">
    </app-product-list>

    <div class="text-center mt-4">
      <app-boton-nuevoproducto (click)="verFormulario()"></app-boton-nuevoproducto>
    </div>
  </section>

  <section id="producto-detalle" *ngIf="mostrarDetalle && productoSeleccionado">
    <div class="header">
      <app-boton-volver text="← volver" (click)="verLista()"></app-boton-volver>
      <h2 class="text-center">{{productoSeleccionado.name | uppercase}}</h2>
    </div>
    <div class="container text-center">
      <img [src]="productoSeleccionado.img" alt="{{productoSeleccionado.name}}" class="product-img my-3">
      <textarea class="form-control mb-2" rows="2" [(ngModel)]="productoSeleccionado.desc"></textarea>
      <input type="number" class="form-control mb-2" [(ngModel)]="productoSeleccionado.price" placeholder="Precio">
      <input type="number" class="form-control mb-2" [(ngModel)]="productoSeleccionado.stock" placeholder="Cantidad">
      <div class="d-flex justify-content-center gap-3 mt-3">
        <app-confirmar-edicion (click)="guardarEdicion()"></app-confirmar-edicion>
        <app-eliminar-producto (click)="eliminarProducto()"></app-eliminar-producto>
      </div>
    </div>
  </section>

  <section id="nuevo-producto" *ngIf="mostrarFormulario">
    <div class="header">
      <app-boton-volver text="← volver" (click)="verLista()"></app-boton-volver>
      <h2 class="text-center">Añadir producto</h2>
    </div>
    <form class="card p-4 text-center">
      <div class="mb-3">
        <label class="form-label">Insertar foto</label>
        <input type="file" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-control" placeholder="Colocar nombre del nuevo producto">
      </div>
      <div class="mb-3">
        <label class="form-label">Descripción</label>
        <textarea class="form-control" rows="3" placeholder="Descripción breve del producto"></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Precio</label>
        <input type="number" class="form-control" placeholder="$">
      </div>
      <div class="mb-3">
        <label class="form-label">Cantidad</label>
        <input type="number" class="form-control" placeholder="Unidades disponibles">
      </div>
      <div class="text-center">
        <app-agregar-producto (click)="agregarProducto()"></app-agregar-producto>
      </div>
    </form>
  </section>

</div>
