<div *ngIf="currentStep" class="onboarding-container">   
  <div class="image-panel">
    <img [src]="currentStep.imageSrc" [alt]="currentStep.imageAlt"> 
  </div>

  <div class="content-panel">
    <div class="text-content">
      <h2 class="text-marron fw-bold">{{ currentStep.title }}</h2>
      <p class="text-muted">{{ currentStep.text }}</p>
    </div>
    <a [routerLink]="currentStep.nextLink" class="btn btn-naranja">{{ currentStep.buttonText }}</a>
  </div>

</div>
