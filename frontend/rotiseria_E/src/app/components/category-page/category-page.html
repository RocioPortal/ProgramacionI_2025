<div class="page-header">
  <a routerLink="/cliente/menu" class="back-button"><i class="bi bi-arrow-left"></i></a>
  <h1 class="header-title">{{ categoryTitle }}</h1>
</div>

<div class="container mb-5 pb-5">
  <div *ngFor="let product of products">
    <div class="card product-full-image-card"> <img [src]="product.image" [alt]="product.name" class="card-img-top"> <div class="card-body-custom"> <div class="info-container-custom"> <h6>{{ product.name }}</h6>
          <p class="text-muted small">{{ product.description }}</p>
          <span class="price">{{ product.price }}</span>
        </div>
        <a routerLink="/cliente/carrito" class="add-button">
          <button class="btn-naranja rounded-circle p-0" style="width: 45px; height: 45px; font-size: 1.4rem;">+</button> </a>
      </div>
    </div>
  </div>
</div>
