<div *ngIf="user" class="profile-container">

  <!-- Alerta de éxito -->
  <div *ngIf="mensajeExito" class="alert alert-success mx-auto mb-3" style="max-width:520px">
    <i class="bi bi-check-circle me-2"></i>{{ mensajeExito }}
  </div>

  <!-- VISTA normal -->
  <div *ngIf="!modoEdicion" class="card profile-card">
    <p class="section-label">Datos personales</p>
    <img [src]="user.avatar" alt="Avatar del usuario" class="avatar">
    <p class="name">{{ user.name }}</p>
    <p class="info-line"><i class="bi bi-envelope me-2"></i>{{ user.email }}</p>
    <p class="info-line"><i class="bi bi-telephone me-2"></i>{{ user.phone || 'Sin teléfono' }}</p>
    <p *ngIf="user.role !== 'cliente'" class="role">Rol: {{ user.role | titlecase }}</p>

    <button (click)="activarEdicion()" class="btn btn-outline-naranja w-100 mt-3">
      <i class="bi bi-pencil me-2"></i>Editar mis datos
    </button>
  </div>

  <!-- VISTA de edición -->
  <div *ngIf="modoEdicion" class="card profile-card">
    <p class="section-label">Editar datos personales</p>

    <div *ngIf="mensajeError" class="alert alert-danger mb-3">{{ mensajeError }}</div>

    <div class="mb-3 text-start">
      <label class="form-label fw-semibold">Nombre</label>
      <input type="text" class="form-control" [(ngModel)]="editNombre" placeholder="Tu nombre">
    </div>
    <div class="mb-3 text-start">
      <label class="form-label fw-semibold">Email</label>
      <input type="email" class="form-control" [(ngModel)]="editEmail" placeholder="correo@ejemplo.com">
    </div>
    <div class="mb-3 text-start">
      <label class="form-label fw-semibold">Teléfono</label>
      <input type="tel" class="form-control" [(ngModel)]="editTelefono" placeholder="+261 ...">
    </div>

    <div class="d-flex gap-2 mt-2">
      <button (click)="cancelarEdicion()" class="btn btn-outline-secondary flex-fill">Cancelar</button>
      <button (click)="guardarCambios()" class="btn btn-naranja flex-fill" [disabled]="guardando">
        <span *ngIf="guardando" class="spinner-border spinner-border-sm me-1"></span>
        Guardar
      </button>
    </div>
  </div>

  <!-- Botón de notificaciones (solo cliente) -->
  <a *ngIf="user.role === 'cliente'" routerLink="/cliente/notificaciones" class="profile-btn">
    <span><i class="bi bi-bell me-2"></i>Mis Notificaciones</span>
    <i class="bi bi-chevron-right"></i>
  </a>

  <!-- Cerrar sesión -->
  <a routerLink="/bienvenida" (click)="cerrarSesion()" class="btn btn-naranja btn-logout">
    Cerrar Sesión
  </a>

</div>
