<div class="d-flex flex-column justify-content-center align-items-center vh-100 text-center">
  <img src="assets/logoprincipal.png" alt="Logo Sabores de Mamás" width="150">

  <h2 class="mt-3 fw-bold" style="color: var(--color-texto); font-size: 1.8rem;">
    Sabores de Mamás
  </h2>

  <div class="d-grid gap-3 mt-4" style="min-width: 260px;">
    <ng-container *ngFor="let item of items">
      <a [routerLink]="basePath + '/' + item.link" class="btn btn-custom btn-lg">{{ item.text }}</a>
    </ng-container>
  </div>
</div>
